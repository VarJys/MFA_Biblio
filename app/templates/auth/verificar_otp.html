{% extends "base.html" %}
{% block title %}BiblioAuth — Verificar OTP{% endblock %}
{% block content %}

<div style="max-width:400px; margin:1.5rem auto;">

  <div class="steps">
    <div class="step completed">
      <div class="step-number">✓</div>
      <div class="step-label">Credenciales</div>
    </div>
    <div class="step-divider"></div>
    <div class="step active">
      <div class="step-number">2</div>
      <div class="step-label">Verificar OTP</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📧 Verificación OTP</div>
    <p class="text-muted mb-2">
      Factor 2 de 2 — Revisa tu correo institucional e ingresa
      el código de 6 dígitos. Válido por 5 minutos.
    </p>

    <form method="POST">
      <div class="form-group">
        <label>Código recibido por correo</label>
        <input type="text" name="otp" class="form-control otp-input"
               placeholder="000000" maxlength="6"
               pattern="\d{6}" inputmode="numeric" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        Verificar acceso
      </button>
    </form>

    <div class="text-center mt-2">
      <a href="{{ url_for('auth.elegir_portal') }}" class="text-muted">
        ← Volver a intentar
      </a>
    </div>
  </div>
</div>

{% endblock %}
