{% extends "base.html" %}
{% block title %}BiblioAuth — Bibliotecario{% endblock %}
{% block content %}

<div style="max-width:420px; margin:3rem auto;">
  <div class="card">
    <div class="card-title">🔐 Acceso Bibliotecario</div>
    <p class="text-muted mb-2">Factor 1 de 2 — Credenciales</p>

    <form method="POST">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="usuario" class="form-control"
               placeholder="admin_biblioteca" required autofocus>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full mt-2">
        Continuar →
      </button>
    </form>

    <div class="text-center mt-2">
      <a href="{{ url_for('auth.elegir_portal') }}" class="text-muted">
        ← Volver al inicio
      </a>
    </div>
  </div>
</div>

{% endblock %}
